version: '3.8'

services:
  # Redis cache
  redis:
    image: redis:7-alpine
    container_name: piratebooty-explorer-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    networks:
      - explorer-network

  # Explorer API
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: piratebooty-explorer-api
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - redis
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DAEMON_HOST=${DAEMON_HOST:-piratebooty-daemon}
      - DAEMON_PORT=${DAEMON_PORT:-19081}
      - REDIS_URL=redis://redis:6379
      - CORS_ORIGIN=${CORS_ORIGIN:-*}
      - LOG_LEVEL=info
    volumes:
      - ./backend/logs:/app/logs
    networks:
      - explorer-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Explorer Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: piratebooty-explorer-frontend
    restart: unless-stopped
    ports:
      - "3001:3000"
    depends_on:
      - api
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=${API_URL:-http://localhost:3000}
      - NEXT_PUBLIC_WS_URL=${WS_URL:-ws://localhost:3000}
    networks:
      - explorer-network

  # Nginx reverse proxy (optional)
  nginx:
    image: nginx:alpine
    container_name: piratebooty-explorer-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - api
      - frontend
    networks:
      - explorer-network

networks:
  explorer-network:
    driver: bridge
    external: false
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  redis-data:
    driver: local
